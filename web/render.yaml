services:
  - type: web
    name: datavizpro-flask
    runtime: python3
    rootDir: web
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 web_app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
